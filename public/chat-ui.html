    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        header h1 { font-size: 16px; font-weight: 600; color: #fff; }
        #status-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; }
        #connection-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; flex-shrink: 0; }
        #connection-dot.connected { background: #4ade80; }
        #connection-dot.disconnected { background: #ef4444; }
        #agent-status { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .spinner { width: 16px; height: 16px; border: 2px solid #333; border-top: 2px solid #4ade80; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .spinner.hidden { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Agent Selector */
        #agent-select { background: #0f0f0f; color: #4ade80; border: 1px solid #333; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2364748B' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; padding-right: 28px; }

        /* Messages */
        main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 88%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-wrap: break-word; }
        .message.user { align-self: flex-end; background: #1d4ed8; color: #fff; border-bottom-right-radius: 4px; }
        .message.agent { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 4px; max-width: 95%; }
        .message.agent .agent-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #333; }
        .message.agent .agent-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
        .message.agent .agent-name { font-size: 12px; font-weight: 600; color: #4ade80; }
        .message.agent h2 { font-size: 14px; margin: 8px 0 4px; color: #4ade80; }
        .message.agent h3 { font-size: 13px; margin: 6px 0 3px; color: #60a5fa; }
        .message.agent p { margin: 4px 0; }
        .message.agent ul, .message.agent ol { margin: 4px 0 4px 16px; }
        .message.agent li { margin: 2px 0; font-size: 13px; }
        .message.agent strong { color: #fff; }
        .message.agent code { background: #0f0f0f; padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
        .message.agent table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; background: #0f0f0f; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .message.agent thead { background: #1a1a1a; }
        .message.agent th { padding: 6px 10px; text-align: left; color: #64748B; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #333; }
        .message.agent td { padding: 6px 10px; border-bottom: 1px solid #222; color: #e0e0e0; }
        .message.agent tr:last-child td { border-bottom: none; }
        .message.agent blockquote { border-left: 3px solid #4ade80; padding-left: 12px; margin: 8px 0; color: #94A3B8; }
        .message.error { background: #1a0000; border-color: #ef4444; color: #fca5a5; }
        .message.elicitation { align-self: flex-start; background: rgba(245,158,11,0.06); border: 1px solid #f59e0b; border-bottom-left-radius: 4px; max-width: 95%; }
        .message .tool-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
        .message .tool-badge { display: inline-block; background: #1e3a5f; color: #60a5fa; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 500; }
        .message .meta { font-size: 10px; color: #475569; margin-top: 8px; padding-top: 6px; border-top: 1px solid #222; font-family: 'JetBrains Mono', monospace; }
        #welcome { text-align: center; color: #475569; margin-top: 60px; font-size: 14px; }
        #welcome svg { display: block; margin: 0 auto 12px; }

        /* Typing indicator */
        .message.typing { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 4px; padding: 12px 16px; }
        .typing-dots { display: flex; gap: 4px; align-items: center; }
        .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: typing 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        .typing-status { font-size: 11px; color: #64748B; margin-left: 8px; font-family: 'JetBrains Mono', monospace; }
        @keyframes typing { 0%,60%,100% { opacity: 0.3; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }

        /* Footer */
        footer { background: #1a1a1a; border-top: 1px solid #333; padding: 10px 12px; display: flex; gap: 10px; flex-shrink: 0; align-items: center; }
        #user-input { flex: 1; background: #0f0f0f; color: #e0e0e0; border: 1px solid #333; border-radius: 20px; padding: 10px 16px; font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 20px; max-height: 120px; }
        #user-input:focus { border-color: #4ade80; }
        #user-input:disabled { opacity: 0.5; }
        #send-btn { background: #4ade80; color: #0f0f0f; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 0; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        #send-btn:hover { background: #22c55e; }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #send-btn svg { width: 18px; height: 18px; }
    </style>

<body>
    <div id="login-screen" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f0f0f;">
        <div style="background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:40px;width:360px;text-align:center;">
            <div style="margin-bottom:24px;">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:16px;"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>
                <h1 style="color:#fff;font-size:26px;margin-bottom:6px;font-weight:700;">Anschluss Mobility</h1>
                <p style="color:#64748B;font-size:13px;">Radparken &amp; Navigation</p>
            </div>
            <input id="login-user" type="text" placeholder="Benutzername" style="width:100%;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:8px;padding:14px 16px;font-size:14px;margin-bottom:12px;box-sizing:border-box;outline:none;" />
            <input id="login-pass" type="password" placeholder="Passwort" style="width:100%;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:8px;padding:14px 16px;font-size:14px;margin-bottom:16px;box-sizing:border-box;outline:none;" />
            <button id="login-btn" style="width:100%;background:#4ade80;color:#0f0f0f;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;">Anmelden</button>
            <div id="login-error" style="color:#ef4444;font-size:13px;margin-top:12px;display:none;"></div>
            <p style="color:#475569;font-size:11px;margin-top:24px;letter-spacing:0.5px;">Powered by FlowMCP</p>
        </div>
    </div>

    <div id="app-container" style="display:none;flex-direction:column;height:100vh;">
    <header>
        <div style="display:flex;align-items:center;gap:12px;">
            <h1>Anschluss Mobility</h1>
            <select id="agent-select">
                <option value="main">Main Agent</option>
                <option value="bahnhof">Bahnhof-Ueberleben</option>
                <option value="tickets">Ticketkauf</option>
                <option value="radparken">Radparken</option>
                <option value="navigator">Navigator</option>
            </select>
        </div>
        <div id="status-bar">
            <span id="connection-dot"></span>
            <span id="agent-status">Idle</span>
            <div class="spinner hidden" id="loading-spinner"></div>
        </div>
    </header>

    <main id="messages">
        <div id="welcome">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>
            Stelle eine Frage zu deiner Reise.
        </div>
    </main>

    <footer>
        <textarea id="user-input" placeholder="Nachricht eingeben..." rows="1"></textarea>
        <button id="send-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script>
        const messagesEl = document.getElementById( 'messages' )
        const inputEl = document.getElementById( 'user-input' )
        const sendBtn = document.getElementById( 'send-btn' )
        const statusEl = document.getElementById( 'agent-status' )
        const spinnerEl = document.getElementById( 'loading-spinner' )
        const dotEl = document.getElementById( 'connection-dot' )
        const agentSelect = document.getElementById( 'agent-select' )
        const welcomeEl = document.getElementById( 'welcome' )

        let isWorking = false
        let sessionIds = {}
        let conversationHistory = []
        const baseUrl = window.location.origin

        // --- SSE Connection ---
        function connectSSE() {
            const evtSource = new EventSource( baseUrl + '/events' )

            evtSource.onopen = function() {
                dotEl.className = 'connected'
                dotEl.id = 'connection-dot'
            }

            evtSource.onerror = function() {
                dotEl.className = 'disconnected'
                dotEl.id = 'connection-dot'
            }

            const eventTypes = [ 'agent:start', 'agent:status', 'agent:complete', 'agent:error' ]
            eventTypes.forEach( function( type ) {
                evtSource.addEventListener( type, function( event ) {
                    const payload = JSON.parse( event.data )
                    handleSSE( type, payload )
                } )
            } )
        }

        function handleSSE( type, payload ) {
            const typingStatus = document.querySelector( '#typing-indicator .typing-status' )

            if( type === 'agent:start' ) {
                setStatus( 'Thinking...', true )
                if( typingStatus ) typingStatus.textContent = 'Denkt nach...'
            } else if( type === 'agent:status' ) {
                const msg = payload.message || ''
                const round = payload.round || 0
                setStatus( 'Round ' + round + ' | ' + msg, true )
                if( typingStatus ) typingStatus.textContent = 'Runde ' + round + ': ' + msg.slice( 0, 40 )
            } else if( type === 'agent:complete' ) {
                setStatus( 'Complete', false )
            } else if( type === 'agent:error' ) {
                setStatus( 'Error: ' + ( payload.error || 'Unknown' ), false )
            }
            messagesEl.scrollTop = messagesEl.scrollHeight
        }

        function setStatus( text, working ) {
            statusEl.textContent = text
            isWorking = working
            spinnerEl.className = working ? 'spinner' : 'spinner hidden'
            inputEl.disabled = working
            sendBtn.disabled = working
        }

        // --- MCP Handshake ---
        async function mcpPost( url, body, sessionId ) {
            const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' }
            if( sessionId ) headers[ 'mcp-session-id' ] = sessionId

            const resp = await fetch( url, { method: 'POST', headers: headers, body: JSON.stringify( body ) } )
            const raw = await resp.text()
            const ct = resp.headers.get( 'content-type' ) || ''

            let data
            if( ct.includes( 'text/event-stream' ) ) {
                const lines = raw.split( '\n' ).filter( function( l ) { return l.startsWith( 'data: ' ) } ).map( function( l ) { return l.slice( 6 ) } )
                data = lines.length > 0 ? JSON.parse( lines[ lines.length - 1 ] ) : {}
            } else {
                data = JSON.parse( raw )
            }

            return { data: data, sessionId: resp.headers.get( 'mcp-session-id' ) }
        }

        async function sendMessage() {
            const query = inputEl.value.trim()
            if( !query || isWorking ) return

            if( welcomeEl ) welcomeEl.remove()
            inputEl.value = ''

            addMessage( query, 'user' )
            setStatus( 'Connecting...', true )

            // Show typing indicator
            const typingEl = document.createElement( 'div' )
            typingEl.className = 'message typing'
            typingEl.id = 'typing-indicator'
            typingEl.innerHTML = '<div style="display:flex;align-items:center;"><div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-status">Verbinde...</span></div>'
            messagesEl.appendChild( typingEl )
            messagesEl.scrollTop = messagesEl.scrollHeight

            const agent = agentSelect.value
            const agentPath = agent === 'main' ? '/mcp/main'
                : agent === 'bahnhof' ? '/mcp/bahnhof'
                : agent === 'tickets' ? '/mcp/tickets'
                : agent === 'radparken' ? '/mcp/radparken'
                : '/mcp/navigator'

            const toolName = agent === 'main' ? 'anschluss-mobility'
                : agent === 'bahnhof' ? 'bahnhofs-ueberleben'
                : agent === 'tickets' ? 'ticketkauf'
                : agent === 'radparken' ? 'radparken'
                : 'anschluss-navigator'
            const url = baseUrl + agentPath

            try {
                if( !sessionIds[ agent ] ) {
                    const init = await mcpPost( url, { jsonrpc: '2.0', id: 1, method: 'initialize', params: { protocolVersion: '2025-03-26', capabilities: { elicitation: { form: {} } }, clientInfo: { name: 'chat-ui', version: '1.0.0' } } } )
                    sessionIds[ agent ] = init.sessionId

                    // Open GET SSE stream for server-initiated requests (elicitation)
                    openServerStream( url, init.sessionId )
                }

                setStatus( 'Waiting for agent...', true )

                conversationHistory.push( { role: 'user', text: query } )
                const fullContext = conversationHistory
                    .map( function( m ) { return m.role === 'user' ? 'User: ' + m.text : 'Agent: ' + m.text } )
                    .join( '\n' )

                const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' }
                headers[ 'mcp-session-id' ] = sessionIds[ agent ]

                const response = await fetch( url, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify( { jsonrpc: '2.0', id: 2, method: 'tools/call', params: { name: toolName, arguments: { query: fullContext } } } )
                } )

                const ct = response.headers.get( 'content-type' ) || ''

                if( ct.includes( 'text/event-stream' ) ) {
                    const reader = response.body.getReader()
                    const decoder = new TextDecoder()
                    let buffer = ''
                    let finalData = null

                    while( true ) {
                        const { done, value } = await reader.read()
                        if( done ) break

                        buffer += decoder.decode( value, { stream: true } )
                        const lines = buffer.split( '\n' )
                        buffer = lines.pop()

                        for( const line of lines ) {
                            if( !line.startsWith( 'data: ' ) ) continue

                            try {
                                const eventData = JSON.parse( line.slice( 6 ) )

                                if( eventData.method === 'elicitation/create' ) {
                                    await handleElicitation( eventData, url, sessionIds[ agent ] )
                                } else if( eventData.result ) {
                                    finalData = eventData
                                }
                            } catch( e ) {}
                        }
                    }

                    if( finalData ) {
                        processAgentResponse( finalData )
                    }
                } else {
                    const raw = await response.text()
                    const data = JSON.parse( raw )
                    processAgentResponse( data )
                }

                const typingEl2 = document.getElementById( 'typing-indicator' )
                if( typingEl2 ) typingEl2.remove()
                setStatus( 'Idle', false )
            } catch( err ) {
                const typingEl3 = document.getElementById( 'typing-indicator' )
                if( typingEl3 ) typingEl3.remove()
                addMessage( 'Fehler: ' + err.message, 'error' )
                setStatus( 'Error', false )
            }
        }

        const agentDisplayNames = { main: 'Anschluss Mobility', bahnhof: 'Bahnhof-Ueberleben', tickets: 'Ticketkauf', radparken: 'Radparken', navigator: 'Navigator' }

        function addMessage( text, type, metadata, toolCalls ) {
            const div = document.createElement( 'div' )
            div.className = 'message ' + type

            if( type === 'agent' ) {
                const currentAgent = agentSelect.value
                const agentName = agentDisplayNames[ currentAgent ] || currentAgent

                // Agent header
                let headerHtml = '<div class="agent-header"><span class="agent-dot"></span><span class="agent-name">' + agentName + '</span></div>'

                // Tool badges
                if( toolCalls && toolCalls.length > 0 ) {
                    const toolOnly = toolCalls.filter( function( t ) { return t.type === 'tool' } )
                    if( toolOnly.length > 0 ) {
                        headerHtml += '<div class="tool-badges">' + toolOnly.map( function( t ) { return '<span class="tool-badge">' + ( t.name || 'tool' ) + '</span>' } ).join( '' ) + '</div>'
                    }
                }

                // Markdown content
                const html = typeof marked !== 'undefined' && marked.parse ? marked.parse( text ) : text.replace( /\n/g, '<br>' )
                div.innerHTML = headerHtml + html

                // Render [MAP:...] tags as Leaflet maps
                const mapMatches = [ ...div.innerHTML.matchAll( /\[MAP:([\d.-]+),([\d.-]+),(\d+),"([^"]+)"\]/g ) ]
                if( mapMatches.length > 0 ) {
                    const mapId = 'map-' + Date.now()
                    const mapDiv = document.createElement( 'div' )
                    mapDiv.id = mapId
                    mapDiv.style.cssText = 'height:200px;border-radius:12px;margin:8px 0;border:1px solid #333;'

                    div.innerHTML = div.innerHTML.replace( /\[MAP:[^\]]+\]/g, '' )
                    div.appendChild( mapDiv )

                    setTimeout( function() {
                        const firstMatch = mapMatches[ 0 ]
                        const map = L.map( mapId ).setView( [ parseFloat( firstMatch[ 1 ] ), parseFloat( firstMatch[ 2 ] ) ], parseInt( firstMatch[ 3 ] ) )
                        L.tileLayer( 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CartoDB' } ).addTo( map )

                        mapMatches.forEach( function( match ) {
                            L.marker( [ parseFloat( match[ 1 ] ), parseFloat( match[ 2 ] ) ] )
                                .addTo( map )
                                .bindPopup( match[ 4 ] )
                        } )
                    }, 100 )
                }

                // Meta info
                if( metadata ) {
                    const rounds = metadata.llmRounds || '?'
                    const tools = metadata.toolCalls || '?'
                    const duration = metadata.duration ? Math.round( metadata.duration / 1000 ) + 's' : '?'
                    const model = ( metadata.model || '?' ).split( '/' ).pop()
                    div.innerHTML += '<div class="meta">' + rounds + ' rounds · ' + tools + ' tools · ' + duration + ' · ' + model + '</div>'
                }
            } else if( type === 'error' ) {
                div.textContent = text
            } else {
                div.textContent = text
            }

            messagesEl.appendChild( div )
            messagesEl.scrollTop = messagesEl.scrollHeight
        }

        // --- Event Handlers ---
        let pendingElicitResolve = null

        function openServerStream( url, sessionId ) {
            fetch( url, {
                method: 'GET',
                headers: { 'Accept': 'text/event-stream', 'mcp-session-id': sessionId }
            } ).then( function( response ) {
                if( !response.ok || !response.body ) return

                const reader = response.body.getReader()
                const decoder = new TextDecoder()
                let buf = ''

                function pump() {
                    reader.read().then( function( result ) {
                        if( result.done ) return

                        buf += decoder.decode( result.value, { stream: true } )
                        const lines = buf.split( '\n' )
                        buf = lines.pop()

                        for( const line of lines ) {
                            if( !line.startsWith( 'data: ' ) ) continue

                            try {
                                const msg = JSON.parse( line.slice( 6 ) )

                                if( msg.method === 'elicitation/create' && msg.params ) {
                                    console.log( 'ELICITATION RECEIVED:', msg )
                                    showElicitationForm( msg, url, sessionId )
                                }
                            } catch( e ) {}
                        }

                        pump()
                    } )
                }

                pump()
            } ).catch( function( e ) {
                console.log( 'Server stream error (may be normal if GET not supported):', e.message )
            } )
        }

        function showElicitationForm( msg, url, sessionId ) {
            const { id, params } = msg
            const { message, requestedSchema } = params

            const bubble = document.createElement( 'div' )
            bubble.className = 'message elicitation'
            bubble.innerHTML = '<strong>Agent fragt:</strong> ' + message

            const form = document.createElement( 'form' )
            form.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:6px;'

            const properties = requestedSchema?.properties || {}
            const required = requestedSchema?.required || []

            Object.entries( properties ).forEach( function( entry ) {
                const key = entry[ 0 ]
                const schema = entry[ 1 ]

                const label = document.createElement( 'label' )
                label.style.cssText = 'font-size:12px;color:#ccc;'
                label.textContent = schema.title || key

                let input
                if( schema.format === 'date' ) {
                    input = document.createElement( 'input' )
                    input.type = 'date'
                } else if( schema.type === 'boolean' ) {
                    input = document.createElement( 'input' )
                    input.type = 'checkbox'
                } else if( schema.enum ) {
                    input = document.createElement( 'select' )
                    schema.enum.forEach( function( val, i ) {
                        const opt = document.createElement( 'option' )
                        opt.value = val
                        opt.textContent = schema.enumNames ? schema.enumNames[ i ] : val
                        input.appendChild( opt )
                    } )
                } else {
                    input = document.createElement( 'input' )
                    input.type = 'text'
                    input.placeholder = schema.description || schema.title || ''
                }

                input.name = key
                input.required = required.includes( key )
                input.style.cssText = 'background:#333;color:#e0e0e0;border:1px solid #555;border-radius:4px;padding:6px 8px;font-size:13px;'
                form.appendChild( label )
                form.appendChild( input )
            } )

            const submitBtn = document.createElement( 'button' )
            submitBtn.textContent = 'Antworten'
            submitBtn.style.cssText = 'background:#f59e0b;color:#000;border:none;border-radius:6px;padding:8px 16px;font-weight:600;cursor:pointer;margin-top:4px;'

            submitBtn.onclick = async function( e ) {
                e.preventDefault()
                const content = {}

                Object.keys( properties ).forEach( function( key ) {
                    const schema = properties[ key ]

                    if( schema.type === 'boolean' ) {
                        content[ key ] = form.elements[ key ]?.checked || false
                    } else {
                        content[ key ] = new FormData( form ).get( key ) || ''
                    }
                } )

                form.remove()
                bubble.innerHTML += '<div style="margin-top:4px;color:#4ade80;font-size:12px;">Geantwortet: ' + Object.values( content ).join( ', ' ) + '</div>'

                // Send elicitation response as POST
                await mcpPost( url, { jsonrpc: '2.0', id: id, result: { action: 'accept', content: content } }, sessionId )
            }

            form.appendChild( submitBtn )
            bubble.appendChild( form )
            messagesEl.appendChild( bubble )
            messagesEl.scrollTop = messagesEl.scrollHeight
        }

        function processAgentResponse( data ) {
            const content = data?.result?.content || []
            const textContent = content.filter( function( c ) { return c.type === 'text' } ).map( function( c ) { return c.text } ).join( '\n' )

            let answerText = textContent
            let metadata = null
            let toolCalls = []

            try {
                const parsed = JSON.parse( textContent )
                answerText = parsed?.result?.text || parsed?.result?.analysis || textContent
                metadata = parsed?.metadata || parsed?.costs || null
                toolCalls = parsed?.costs?.breakdown || []
            } catch( e ) {}

            if( textContent.includes( '"code":402' ) || textContent.includes( 'credits' ) ) {
                addMessage( 'Credits aufgebraucht. Bitte OpenRouter Credits aufladen.', 'error' )
            } else {
                addMessage( answerText, 'agent', metadata, toolCalls )
                conversationHistory.push( { role: 'agent', text: answerText.slice( 0, 500 ) } )
            }
        }

        async function handleElicitation( eventData, url, sessionId ) {
            const { id, params } = eventData
            const { message, requestedSchema } = params

            // Zeige Rueckfrage als gelbe Bubble
            const bubble = document.createElement( 'div' )
            bubble.className = 'message elicitation'
            bubble.innerHTML = '<strong>Agent fragt:</strong> ' + message

            // Formular aus Schema bauen
            const form = document.createElement( 'form' )
            form.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:6px;'

            const properties = requestedSchema?.properties || {}
            const required = requestedSchema?.required || []

            Object.entries( properties ).forEach( function( entry ) {
                const key = entry[ 0 ]
                const schema = entry[ 1 ]

                const label = document.createElement( 'label' )
                label.style.cssText = 'font-size:12px;color:#ccc;'
                label.textContent = schema.title || key

                let input

                if( schema.format === 'date' ) {
                    input = document.createElement( 'input' )
                    input.type = 'date'
                } else if( schema.type === 'boolean' ) {
                    input = document.createElement( 'input' )
                    input.type = 'checkbox'
                } else if( schema.enum ) {
                    input = document.createElement( 'select' )
                    schema.enum.forEach( function( val, i ) {
                        const opt = document.createElement( 'option' )
                        opt.value = val
                        opt.textContent = schema.enumNames ? schema.enumNames[ i ] : val
                        input.appendChild( opt )
                    } )
                } else if( schema.type === 'number' || schema.type === 'integer' ) {
                    input = document.createElement( 'input' )
                    input.type = 'number'
                } else {
                    input = document.createElement( 'input' )
                    input.type = 'text'
                    input.placeholder = schema.description || schema.title || ''
                }

                input.name = key
                input.required = required.includes( key )
                input.style.cssText = 'background:#333;color:#e0e0e0;border:1px solid #555;border-radius:4px;padding:6px 8px;font-size:13px;'

                form.appendChild( label )
                form.appendChild( input )
            } )

            // Buttons
            const btnRow = document.createElement( 'div' )
            btnRow.style.cssText = 'display:flex;gap:8px;margin-top:4px;'

            const submitBtn = document.createElement( 'button' )
            submitBtn.textContent = 'Antworten'
            submitBtn.style.cssText = 'background:#f59e0b;color:#000;border:none;border-radius:6px;padding:8px 16px;font-weight:600;cursor:pointer;'

            const declineBtn = document.createElement( 'button' )
            declineBtn.textContent = 'Überspringen'
            declineBtn.style.cssText = 'background:#444;color:#aaa;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;'

            btnRow.appendChild( submitBtn )
            btnRow.appendChild( declineBtn )
            form.appendChild( btnRow )
            bubble.appendChild( form )
            messagesEl.appendChild( bubble )
            messagesEl.scrollTop = messagesEl.scrollHeight

            // Warten auf User-Input
            return new Promise( function( resolve ) {
                submitBtn.onclick = async function( e ) {
                    e.preventDefault()
                    const formData = new FormData( form )
                    const content = {}

                    Object.keys( properties ).forEach( function( key ) {
                        const schema = properties[ key ]

                        if( schema.type === 'boolean' ) {
                            content[ key ] = form.elements[ key ].checked
                        } else if( schema.type === 'number' || schema.type === 'integer' ) {
                            content[ key ] = Number( formData.get( key ) )
                        } else {
                            content[ key ] = formData.get( key )
                        }
                    } )

                    form.remove()
                    bubble.innerHTML += '<div style="margin-top:4px;color:#4ade80;font-size:12px;">Geantwortet: ' + Object.values( content ).join( ', ' ) + '</div>'

                    await mcpPost( url, { jsonrpc: '2.0', id: id, result: { action: 'accept', content: content } }, sessionId )
                    resolve()
                }

                declineBtn.onclick = async function( e ) {
                    e.preventDefault()
                    form.remove()
                    bubble.innerHTML += '<div style="margin-top:4px;color:#888;font-size:12px;">Übersprungen</div>'

                    await mcpPost( url, { jsonrpc: '2.0', id: id, result: { action: 'decline' } }, sessionId )
                    resolve()
                }
            } )
        }

        sendBtn.addEventListener( 'click', sendMessage )

        inputEl.addEventListener( 'keydown', function( e ) {
            if( e.key === 'Enter' && !e.shiftKey ) {
                e.preventDefault()
                sendMessage()
            }
        } )

        inputEl.addEventListener( 'input', function() {
            this.style.height = 'auto'
            this.style.height = Math.min( this.scrollHeight, 120 ) + 'px'
        } )

        // --- Login ---
        document.getElementById( 'login-btn' ).addEventListener( 'click', async function() {
            const username = document.getElementById( 'login-user' ).value
            const password = document.getElementById( 'login-pass' ).value
            const errorEl = document.getElementById( 'login-error' )

            try {
                const resp = await fetch( baseUrl + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify( { username, password } )
                } )

                if( resp.ok ) {
                    document.getElementById( 'login-screen' ).style.display = 'none'
                    document.getElementById( 'app-container' ).style.display = 'flex'
                    connectSSE()
                } else {
                    errorEl.textContent = 'Falsche Zugangsdaten'
                    errorEl.style.display = 'block'
                }
            } catch( e ) {
                errorEl.textContent = 'Verbindungsfehler'
                errorEl.style.display = 'block'
            }
        } )

        document.getElementById( 'login-pass' ).addEventListener( 'keydown', function( e ) {
            if( e.key === 'Enter' ) document.getElementById( 'login-btn' ).click()
        } )

        // --- Autofill from URL params ---
        const urlParams = new URLSearchParams( window.location.search )
        const autoUser = urlParams.get( 'u' )
        const autoPass = urlParams.get( 'p' )
        if( autoUser && autoPass ) {
            document.getElementById( 'login-user' ).value = autoUser
            document.getElementById( 'login-pass' ).value = autoPass
            document.getElementById( 'login-btn' ).click()
        }
    </script>
</body>
</html>
